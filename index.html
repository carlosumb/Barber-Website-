<button id="feedbackBtn" onclick="openFeedbackModal()">💬 Feedback</button>

<div id="feedbackOverlay" style="display:none;">
  <div id="feedbackModal">
    <div class="modal-header">
      <h3>Send feedback</h3>
      <button onclick="closeFeedbackModal()">×</button>
    </div>

    <label>What kind of feedback?</label>
    <select id="feedbackType" onchange="showTextBox()">
      <option value="" disabled selected>Select an option...</option>
      <option value="bug">Bug report</option>
      <option value="room-change">Room / service change</option>
      <option value="general">General feedback</option>
    </select>

    <!-- This stays hidden until they pick an option -->
    <div id="feedbackDetails" style="display:none;">
      <label id="feedbackLabel">Describe what happened:</label>
      <textarea id="feedbackText" placeholder="Tell me more..."></textarea>
      <div class="modal-actions">
        <button onclick="closeFeedbackModal()">Cancel</button>
        <button onclick="submitFeedback()">Send</button>
      </div>
    </div>

    <p id="feedbackSuccess" style="display:none;">Thanks for your feedback!</p>
  </div>
</div>

<script>
  function openFeedbackModal() {
    document.getElementById("feedbackOverlay").style.display = "flex";
  }

  function closeFeedbackModal() {
    document.getElementById("feedbackOverlay").style.display = "none";
    document.getElementById("feedbackSuccess").style.display = "none";
    document.getElementById("feedbackDetails").style.display = "none";
    document.getElementById("feedbackText").value = "";
    document.getElementById("feedbackType").value = "";
  }

  function showTextBox() {
    const type = document.getElementById("feedbackType").value;
    const label = document.getElementById("feedbackLabel");
    const details = document.getElementById("feedbackDetails");

    // Change the label based on what they picked
    if (type === "bug") {
      label.textContent = "Describe the bug:";
    } else if (type === "room-change") {
      label.textContent = "What changed? (service, price, availability, etc.)";
    } else if (type === "general") {
      label.textContent = "What's on your mind?";
    }

    details.style.display = "block";
  }

  function submitFeedback() {
    const type = document.getElementById("feedbackType").value;
    const text = document.getElementById("feedbackText").value;
    if (!text.trim()) return;

    fetch("http://localhost:8000/feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ spaceId: type, feedback: text })
    })
    .then(() => {
      document.getElementById("feedbackDetails").style.display = "none";
      document.getElementById("feedbackSuccess").style.display = "block";
      setTimeout(closeFeedbackModal, 1800);
    });
  }
</script>
